version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15
    container_name: webhook-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: webhook_pipeline
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Server
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook-server
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook_pipeline
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhook_pipeline
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    volumes:
      - .:/app
      - /app/node_modules

  # Background Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webhook-worker
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/webhook_pipeline
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: webhook_pipeline
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
      server:
        condition: service_started
    command: sh -c "sleep 10 && npm run worker"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: